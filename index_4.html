<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドル円トレード記録 | 2026.4</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* month hero */
    .month-hero{
      background:linear-gradient(135deg,#161b22 0%,#0d1117 100%);
      border:1px solid var(--border);border-radius:var(--r2);
      padding:28px 28px 24px;margin-bottom:24px;
      position:relative;overflow:hidden;
    }
    .month-hero::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:180px;height:180px;
      background:radial-gradient(circle,#3fb95015 0%,transparent 70%);
      border-radius:50%;
    }
    .month-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
    .month-label{
      font-size:11px;color:var(--text3);text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:6px;
    }
    .month-title{font-size:26px;font-weight:700;color:var(--text);line-height:1.2;}
    .month-sub{font-size:12px;color:var(--text3);margin-top:4px;}
    .month-tags{display:flex;gap:6px;flex-wrap:wrap;}
    .mtag{
      background:var(--bg3);border:1px solid var(--border);
      padding:3px 10px;border-radius:6px;font-size:11px;color:var(--text3);
    }
    .mtag.active{background:#3fb95015;border-color:#3fb95044;color:var(--green);}

    /* no-record row */
    .no-record td{color:var(--text3);text-align:center;padding:20px;font-size:13px;}
    @media(max-width:600px){ .hide-sm{ display:none; } }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="site-title">
    📊 トレード記録
    <span class="pair-tag">USD/JPY</span>
    <span style="color:var(--text3);font-size:12px;">東京タイム限定</span>
  </div>
  <nav class="header-nav">
    <a href="rule/rule.html" class="nav-btn">📘 ルール</a>
  </nav>
</header>

<!-- ── MAIN ── -->
<main class="container">

  <!-- month hero -->
  <div class="month-hero">
    <div class="month-hero-top">
      <div>
        <div class="month-label">Monthly Report</div>
        <div class="month-title">2026<span style="color:var(--text3);font-size:18px;">.04</span></div>
        <div class="month-sub">April 2026 — Tokyo Session</div>
      </div>
      <div class="month-tags">
        <span class="mtag" id="statusBadge">…</span>
        <span class="mtag">USD/JPY</span>
        <span class="mtag">東京 09:00〜12:00</span>
      </div>
    </div>
  </div>

  <!-- stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">合計 pips</div>
      <div class="stat-value neu" id="totalPips">0<span class="stat-unit">pips</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">勝率</div>
      <div class="stat-value neu" id="winRate">0.0<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">平均 pips</div>
      <div class="stat-value neu" id="avgPips">0.0<span class="stat-unit">pips</span></div>
    </div>
  </div>

  <!-- record list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 記録一覧</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;color:var(--text3);" id="dataSource"></span>
        <span style="font-size:11px;color:var(--text3);" id="recordCount">読込中…</span>
      </span>
    </div>
    <div style="overflow-x:auto;">
      <table class="record-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>9-10値動き</th>
            <th class="hide-sm">異常性</th>
            <th class="hide-sm">継続性</th>
            <th>行動</th>
            <th>pips</th>
            <th>詳細</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr>
            <td colspan="7" style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">
              日誌ページで「保存する」を押すと自動で表示されます
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- pips chart -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📈 月間 pips グラフ</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap">
        <canvas id="pipsChart" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- quick links -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 日別リンク（2026年4月）</span>
    </div>
    <div class="card-body">
      <div id="dayLinks" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </div>

</main>

<footer class="site-footer">
  USD/JPY · Tokyo Session · 2026.04 · Trade Journal
</footer>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   AUTO-SCAN: GitHub API で nissi/ フォルダを取得 →
              localStorage からデータを読み込み → 自動集計
   ════════════════════════════════════════════════════════════ */

function detectRepo() {
  const { hostname, pathname } = location;
  const ghMatch = hostname.match(/^(.+)\.github\.io$/);
  if (!ghMatch) return null;
  const owner = ghMatch[1];
  const parts = pathname.replace(/\/+$/,'').split('/').filter(Boolean);
  const repo  = parts.length ? parts[0] : owner + '.github.io';
  return { owner, repo };
}

async function fetchNissiDates(owner, repo) {
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/nissi`;
  const res = await fetch(apiUrl, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const files = await res.json();
  return files
    .filter(f => f.type === 'file' && /^\d{8}\.html$/.test(f.name))
    .map(f => f.name.replace('.html', ''))
    .sort();
}

function scanLocalStorage() {
  const dates = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (/^trade_\d{8}$/.test(k)) dates.push(k.replace('trade_',''));
  }
  return dates.sort();
}

function loadRecord(dateKey) {
  const raw = localStorage.getItem(`trade_${dateKey}`);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

const moveMap   = { up_s:'↑↑ 強い上昇', up_g:'↑ 緩やかな上昇', down_s:'↓↓ 強い下降', down_g:'↓ 緩やかな下降', flat:'→ 方向感なし' };
const moveCls   = { up_s:'up', up_g:'up', down_s:'down', down_g:'down', flat:'flat' };
const actionMap = { buy:'買い', sell:'売り', watch:'見送り' };
const actCls    = { buy:'buy', sell:'sell', watch:'watch' };
const ynMap     = { yes:'有り', no:'無し' };

/* ── 稼働中バッジ（東京タイム 09:00〜12:00 JST・平日のみ） ── */
(function(){
  const el = document.getElementById('statusBadge');

  // JST (UTC+9) での現在時刻を取得
  const nowUtc  = new Date();
  const jst     = new Date(nowUtc.getTime() + 9 * 60 * 60 * 1000);
  const y       = jst.getUTCFullYear();
  const m       = jst.getUTCMonth(); // 0-index: 3 = April
  const dow     = jst.getUTCDay();   // 0=日, 6=土
  const h       = jst.getUTCHours();
  const min     = jst.getUTCMinutes();
  const timeMin = h * 60 + min;     // 午前0時からの分数

  const monthStart = Date.UTC(2026, 3, 1);  // 2026-04-01 00:00 UTC
  const monthEnd   = Date.UTC(2026, 4, 1);  // 2026-05-01 00:00 UTC
  const nowMs      = nowUtc.getTime();

  const isThisMonth = y === 2026 && m === 3;
  const isWeekday   = dow >= 1 && dow <= 5;           // 月〜金
  const isSession   = timeMin >= 9*60 && timeMin < 12*60; // 09:00〜12:00 JST

  if (nowMs < monthStart) {
    // 月開始前
    el.className   = 'mtag';
    el.textContent = '⏳ 開始前';
  } else if (nowMs >= monthEnd) {
    // 月終了後
    el.className = 'mtag';
    el.style.cssText = 'background:#8b949e18;border:1px solid #8b949e44;color:var(--text3);padding:3px 10px;border-radius:6px;font-size:11px;';
    el.textContent   = '✅ 完了';
  } else if (isThisMonth && isWeekday && isSession) {
    // 東京タイム稼働中（平日 09:00〜12:00 JST）
    el.className   = 'mtag active';
    el.textContent = '🟢 稼働中';
  } else if (!isWeekday) {
    // 今月だが週末
    el.className = 'mtag';
    el.style.cssText = 'background:#d2992218;border:1px solid #d2992244;color:var(--yellow);padding:3px 10px;border-radius:6px;font-size:11px;';
    el.textContent   = '🟡 週末';
  } else {
    // 今月・平日だがセッション外
    el.className = 'mtag';
    el.style.cssText = 'background:#1f6feb18;border:1px solid #1f6feb44;color:var(--blue);padding:3px 10px;border-radius:6px;font-size:11px;';
    el.textContent   = '🔵 セッション外';
  }

  // 次の分の変わり目に再チェック（リアルタイム更新）
  const msToNextMin = (60 - new Date().getSeconds()) * 1000;
  setTimeout(function tick() {
    location.reload();
  }, msToNextMin);
})();

let chartInstance = null;

function renderAll(RECORDS, allDates) {
  const traded = RECORDS.filter(r => r.action !== 'watch');
  const wins   = traded.filter(r => r.pips > 0);
  const total  = traded.reduce((s, r) => s + r.pips, 0);
  const avg    = traded.length ? total / traded.length : 0;
  const wr     = traded.length ? wins.length / traded.length * 100 : 0;

  const fmt = (v, unit) =>
    `${v >= 0 ? '+' : ''}${v.toFixed(1)}<span class="stat-unit">${unit}</span>`;

  const tvEl = document.getElementById('totalPips');
  const wrEl = document.getElementById('winRate');
  const avEl = document.getElementById('avgPips');

  tvEl.innerHTML = fmt(total, 'pips');
  tvEl.className = `stat-value ${total > 0 ? 'pos' : total < 0 ? 'neg' : 'neu'}`;

  wrEl.innerHTML = `${wr.toFixed(1)}<span class="stat-unit">%</span>`;
  wrEl.className = `stat-value ${wr >= 50 ? 'pos' : wr > 0 ? 'neu' : 'neg'}`;

  avEl.innerHTML = fmt(avg, 'pips');
  avEl.className = `stat-value ${avg > 0 ? 'pos' : avg < 0 ? 'neg' : 'neu'}`;

  const countEl = document.getElementById('recordCount');
  countEl.textContent = `${RECORDS.length} 件 / ${allDates.length} 日`;

  const tbody = document.getElementById('recordBody');
  tbody.innerHTML = '';

  if (!RECORDS.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">
      日誌ページで「保存する」を押すと自動で表示されます
    </td></tr>`;
  } else {
    RECORDS.forEach(r => {
      const p   = r.pips || 0;
      const mv  = r.move9to10 || '';
      const abn = r.abnormal   || '';
      const con = r.continuity || '';
      const tr  = document.createElement('tr');
      tr.innerHTML = `
        <td><a class="date-link" href="nissi/${r.date}.html">${r.label}</a></td>
        <td>${mv  ? `<span class="badge ${moveCls[mv]||'flat'}">${moveMap[mv]}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
        <td class="hide-sm">${abn ? `<span class="badge ${abn==='yes'?'up':'flat'}">${ynMap[abn]}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
        <td class="hide-sm">${con ? `<span class="badge ${con==='yes'?'up':'flat'}">${ynMap[con]}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
        <td><span class="badge ${actCls[r.action]||'flat'}">${actionMap[r.action]||'—'}</span></td>
        <td><span class="pips-val ${p>0?'pos':p<0?'neg':'ze'}">${p>0?'+':''}${p.toFixed(1)}</span></td>
        <td><a href="nissi/${r.date}.html" class="nav-btn" style="padding:3px 10px;font-size:11px;">→</a></td>
      `;
      tbody.appendChild(tr);
    });
  }

  const container = document.getElementById('dayLinks');
  container.innerHTML = '';
  const year = 2026, month = 4;
  const days = new Date(year, month, 0).getDate();

  for (let d = 1; d <= days; d++) {
    const dd  = String(d).padStart(2, '0');
    const key = `${year}${String(month).padStart(2, '0')}${dd}`;
    const rec = RECORDS.find(r => r.date === key);
    const exists = allDates.includes(key);

    const a = document.createElement('a');
    a.href = `nissi/${key}.html`;
    a.style.cssText = `
      display:inline-flex;align-items:center;justify-content:center;
      width:48px;height:36px;border-radius:6px;font-size:12px;
      font-family:'JetBrains Mono',monospace;font-weight:600;
      text-decoration:none;transition:all .12s;
      background:var(--bg3);border:1px solid var(--border);color:var(--text3);
    `;
    if (!exists) a.style.opacity = '0.35';

    a.textContent = `${month}/${d}`;
    if (rec) {
      if (rec.pips > 0)      { a.style.background='#3fb95022';a.style.borderColor='#3fb95055';a.style.color='var(--green)';a.style.opacity='1'; }
      else if (rec.pips < 0) { a.style.background='#f8514922';a.style.borderColor='#f8514955';a.style.color='var(--red)';  a.style.opacity='1'; }
      else                   { a.style.background='#d2992222';a.style.borderColor='#d2992255';a.style.color='var(--yellow)';a.style.opacity='1'; }
    }
    a.addEventListener('mouseover', () => { a.style.opacity = '0.65'; });
    a.addEventListener('mouseout',  () => { a.style.opacity = (!rec && !exists) ? '0.35' : '1'; });
    container.appendChild(a);
  }

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = document.getElementById('pipsChart').getContext('2d');

  if (!RECORDS.length) {
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels: ['データなし'], datasets: [{ data: [0], backgroundColor: '#30363d', borderRadius: 4 }] },
      options: {
        responsive: true,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { ticks: { color: '#6e7681' }, grid: { color: '#21262d' } },
          y: { ticks: { color: '#6e7681' }, grid: { color: '#21262d' } }
        }
      }
    });
    return;
  }

  const labels  = RECORDS.map(r => r.label.slice(5));
  const bars    = RECORDS.map(r => r.pips || 0);
  let cum = 0;
  const cumLine = RECORDS.map(r => { cum += (r.pips || 0); return +cum.toFixed(1); });

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'line', label: '累積 pips', data: cumLine,
          borderColor: '#58a6ff', backgroundColor: '#58a6ff22',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#58a6ff',
          fill: true, tension: .35, yAxisID: 'y'
        },
        {
          type: 'bar', label: '日次 pips', data: bars,
          backgroundColor: bars.map(v => v >= 0 ? '#3fb95088' : '#f8514988'),
          borderColor:      bars.map(v => v >= 0 ? '#3fb950'   : '#f85149'),
          borderWidth: 1, borderRadius: 4, yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#8b949e',
          callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y >= 0 ? '+' : ''}${c.parsed.y} pips` }
        }
      },
      scales: {
        x: { ticks: { color: '#6e7681', font: { size: 11 } }, grid: { color: '#21262d30' } },
        y: { ticks: { color: '#6e7681', font: { size: 11 } }, grid: { color: '#21262d' } }
      }
    }
  });
}

function setStatus(msg, color = 'var(--text3)') {
  document.getElementById('recordCount').innerHTML =
    `<span style="color:${color}">${msg}</span>`;
}

async function init() {
  setStatus('⏳ データ読み込み中…');

  let allDates = [];

  const repoInfo = detectRepo();
  if (repoInfo) {
    try {
      allDates = await fetchNissiDates(repoInfo.owner, repoInfo.repo);
    } catch (e) {
      console.warn('GitHub API fallback:', e.message);
    }
  }

  const lsDates = scanLocalStorage();
  lsDates.forEach(d => { if (!allDates.includes(d)) allDates.push(d); });
  allDates.sort();

  const RECORDS = [];
  allDates.forEach(dateKey => {
    const d = loadRecord(dateKey);
    if (!d) return;
    if (!d.date)  d.date  = dateKey;
    if (!d.label) d.label = `${dateKey.slice(0,4)}-${dateKey.slice(4,6)}-${dateKey.slice(6,8)}`;
    RECORDS.push(d);
  });

  renderAll(RECORDS, allDates);

  const sourceNote = repoInfo
    ? `<span title="${repoInfo.owner}/${repoInfo.repo}" style="cursor:default">
        🔗 GitHub API + localStorage
       </span>`
    : '💾 localStorage（ローカル実行）';
  document.getElementById('dataSource').innerHTML = sourceNote;
}

init();
</script>
</body>
</html>
