<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドル円トレード記録 | 2026.4</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* month hero */
    .month-hero{
      background:linear-gradient(135deg,#161b22 0%,#0d1117 100%);
      border:1px solid var(--border);border-radius:var(--r2);
      padding:28px 28px 24px;margin-bottom:24px;
      position:relative;overflow:hidden;
    }
    .month-hero::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:180px;height:180px;
      background:radial-gradient(circle,#3fb95015 0%,transparent 70%);
      border-radius:50%;
    }
    .month-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
    .month-label{
      font-size:11px;color:var(--text3);text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:6px;
    }
    .month-title{font-size:26px;font-weight:700;color:var(--text);line-height:1.2;}
    .month-sub{font-size:12px;color:var(--text3);margin-top:4px;}
    .month-tags{display:flex;gap:6px;flex-wrap:wrap;}
    .mtag{
      background:var(--bg3);border:1px solid var(--border);
      padding:3px 10px;border-radius:6px;font-size:11px;color:var(--text3);
    }
    .mtag.active{background:#3fb95015;border-color:#3fb95044;color:var(--green);}

    /* no-record row */
    .no-record td{color:var(--text3);text-align:center;padding:20px;font-size:13px;}
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="site-title">
    📊 トレード記録
    <span class="pair-tag">USD/JPY</span>
    <span style="color:var(--text3);font-size:12px;">東京タイム限定</span>
  </div>
  <nav class="header-nav">
    <a href="rule/rule.html" class="nav-btn">📘 ルール</a>
  </nav>
</header>

<!-- ── MAIN ── -->
<main class="container">

  <!-- month hero -->
  <div class="month-hero">
    <div class="month-hero-top">
      <div>
        <div class="month-label">Monthly Report</div>
        <div class="month-title">2026<span style="color:var(--text3);font-size:18px;">.04</span></div>
        <div class="month-sub">April 2026 — Tokyo Session</div>
      </div>
      <div class="month-tags">
        <span class="mtag active">🟢 稼働中</span>
        <span class="mtag">USD/JPY</span>
        <span class="mtag">東京 09:00〜12:00</span>
      </div>
    </div>
  </div>

  <!-- stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">合計 pips</div>
      <div class="stat-value neu" id="totalPips">0<span class="stat-unit">pips</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">勝率</div>
      <div class="stat-value neu" id="winRate">0.0<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">平均 pips</div>
      <div class="stat-value neu" id="avgPips">0.0<span class="stat-unit">pips</span></div>
    </div>
  </div>

  <!-- record list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 記録一覧</span>
      <span style="font-size:11px;color:var(--text3);" id="recordCount">0 件</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="record-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>日足環境</th>
            <th>短期足</th>
            <th>行動</th>
            <th>pips</th>
            <th>詳細</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr>
            <td colspan="6" style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">
              ← 記録を追加すると一覧に表示されます
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- pips chart -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📈 月間 pips グラフ</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap">
        <canvas id="pipsChart" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- quick links -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 日別リンク（2026年4月）</span>
    </div>
    <div class="card-body">
      <div id="dayLinks" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </div>

</main>

<footer class="site-footer">
  USD/JPY · Tokyo Session · 2026.04 · Trade Journal
</footer>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
/* ── データ定義 ──────────────────────────────────────
   各日のデータをここに追加してください。
   nissi/ フォルダ配下の HTML から localStorage に保存するか、
   直接この配列に記入する運用どちらでも OK です。
──────────────────────────────────────────────────── */
const RECORDS = [
  // 例:
  // { date:'20260401', label:'2026-04-01', nikkiEnv:'flat', shortEnv:'up_s', action:'buy', pips:3.2 },
];

/* ── 日別リンク生成 ── */
(function(){
  const container = document.getElementById('dayLinks');
  const year = 2026, month = 4;
  const days = new Date(year, month, 0).getDate();
  for(let d = 1; d <= days; d++){
    const dd  = String(d).padStart(2,'0');
    const key = `${year}${String(month).padStart(2,'0')}${dd}`;
    const label = `${month}/${d}`;
    const rec = RECORDS.find(r => r.date === key);
    const a = document.createElement('a');
    a.href = `nissi/${key}.html`;
    a.style.cssText = `
      display:inline-flex;align-items:center;justify-content:center;
      width:48px;height:36px;border-radius:6px;font-size:12px;
      font-family:'JetBrains Mono',monospace;font-weight:600;
      text-decoration:none;transition:all .12s;
      background:var(--bg3);border:1px solid var(--border);color:var(--text3);
    `;
    a.textContent = label;
    if(rec){
      if(rec.pips > 0)      { a.style.background='#3fb95022';a.style.borderColor='#3fb95055';a.style.color='var(--green)'; }
      else if(rec.pips < 0) { a.style.background='#f8514922';a.style.borderColor='#f8514955';a.style.color='var(--red)'; }
      else                  { a.style.background='#d2992222';a.style.borderColor='#d2992255';a.style.color='var(--yellow)'; }
    }
    a.addEventListener('mouseover',()=>{ a.style.opacity='.75'; });
    a.addEventListener('mouseout', ()=>{ a.style.opacity='1'; });
    container.appendChild(a);
  }
})();

/* ── 統計・テーブル生成 ── */
(function(){
  if(!RECORDS.length) return;

  const traded = RECORDS.filter(r => r.action !== 'watch');
  const wins   = traded.filter(r => r.pips > 0);
  const total  = traded.reduce((s,r)=>s+r.pips,0);
  const avg    = traded.length ? total/traded.length : 0;
  const wr     = traded.length ? (wins.length/traded.length*100) : 0;

  /* stats */
  const tvEl = document.getElementById('totalPips');
  const wrEl = document.getElementById('winRate');
  const avEl = document.getElementById('avgPips');

  tvEl.innerHTML = `${total>=0?'+':''}${total.toFixed(1)}<span class="stat-unit">pips</span>`;
  tvEl.className = `stat-value ${total>0?'pos':total<0?'neg':'neu'}`;

  wrEl.innerHTML = `${wr.toFixed(1)}<span class="stat-unit">%</span>`;
  wrEl.className = `stat-value ${wr>=50?'pos':wr>0?'neu':'neg'}`;

  avEl.innerHTML = `${avg>=0?'+':''}${avg.toFixed(1)}<span class="stat-unit">pips</span>`;
  avEl.className = `stat-value ${avg>0?'pos':avg<0?'neg':'neu'}`;

  document.getElementById('recordCount').textContent = `${RECORDS.length} 件`;

  /* table */
  const envMap = {
    up_s:'強い上昇', up_g:'緩やかな上昇', down_s:'強い下降', down_g:'緩やかな下降', flat:'方向感なし'
  };
  const nikkiMap = { up:'上昇', down:'下降', flat:'方向感なし' };
  const actionMap = { buy:'買い', sell:'売り', watch:'見送り' };
  const envClass  = { up_s:'up', up_g:'up', down_s:'down', down_g:'down', flat:'flat', up:'up', down:'down' };
  const actClass  = { buy:'buy', sell:'sell', watch:'watch' };

  const tbody = document.getElementById('recordBody');
  tbody.innerHTML = '';
  RECORDS.forEach(r => {
    const tr = document.createElement('tr');
    const p  = r.pips;
    tr.innerHTML = `
      <td><a class="date-link" href="nissi/${r.date}.html">${r.label}</a></td>
      <td><span class="badge ${envClass[r.nikkiEnv]||'flat'}">${nikkiMap[r.nikkiEnv]||'-'}</span></td>
      <td><span class="badge ${envClass[r.shortEnv]||'flat'}">${envMap[r.shortEnv]||'-'}</span></td>
      <td><span class="badge ${actClass[r.action]||'flat'}">${actionMap[r.action]||'-'}</span></td>
      <td><span class="pips-val ${p>0?'pos':p<0?'neg':'ze'}">${p>0?'+':''}${p.toFixed(1)}</span></td>
      <td><a href="nissi/${r.date}.html" class="nav-btn" style="padding:3px 10px;font-size:11px;">→</a></td>
    `;
    tbody.appendChild(tr);
  });
})();

/* ── Chart.js グラフ ── */
(function(){
  const ctx = document.getElementById('pipsChart').getContext('2d');

  if(!RECORDS.length){
    /* empty state */
    const chart = new Chart(ctx,{
      type:'bar',
      data:{
        labels:['データなし'],
        datasets:[{data:[0],backgroundColor:'#30363d',borderRadius:4}]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{
          x:{ticks:{color:'#6e7681'},grid:{color:'#21262d'}},
          y:{ticks:{color:'#6e7681'},grid:{color:'#21262d'}}
        }
      }
    });
    return;
  }

  /* cumulative line + bar */
  const labels  = RECORDS.map(r=>r.label.slice(5));
  const bars    = RECORDS.map(r=>r.pips);
  let cum=0;
  const cumLine = RECORDS.map(r=>{ cum+=r.pips; return +cum.toFixed(1); });

  new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          type:'line',label:'累積 pips',data:cumLine,
          borderColor:'#58a6ff',backgroundColor:'#58a6ff22',
          borderWidth:2,pointRadius:3,pointBackgroundColor:'#58a6ff',
          fill:true,tension:.35,yAxisID:'y'
        },
        {
          type:'bar',label:'日次 pips',data:bars,
          backgroundColor:bars.map(v=>v>=0?'#3fb95088':'#f8514988'),
          borderColor:bars.map(v=>v>=0?'#3fb950':'#f85149'),
          borderWidth:1,borderRadius:4,yAxisID:'y'
        }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:true,
          labels:{color:'#8b949e',font:{size:11},boxWidth:12}
        },
        tooltip:{
          backgroundColor:'#161b22',
          borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#8b949e',
          callbacks:{
            label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y >= 0?'+':''}${ctx.parsed.y} pips`
          }
        }
      },
      scales:{
        x:{ticks:{color:'#6e7681',font:{size:11}},grid:{color:'#21262d30'}},
        y:{ticks:{color:'#6e7681',font:{size:11}},grid:{color:'#21262d'},
           callbacks:{value:(v)=>`${v>0?'+':''}${v}`}
        }
      }
    }
  });
})();
</script>
</body>
</html>
